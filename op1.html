<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>club rambla. | Minimal B&W</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E2E2E2">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styleop1.css">
</head>
<body>

    <div class="aurora-bg">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>

    <div id="modalAlertaCustom" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="textoAlertaCustom" class="custom-modal-text">Mensaje de error</div>
            <button id="btnCerrarAlerta" class="btn-modal-ok">Entendido</button>
        </div>
    </div>

    <div class="main-container">
        
        <!-- PANTALLA DE CARGA -->
        <div id="pantallaSkeleton">
            <div class="wallet-card">
                <div class="card-header-skeleton">
                    <div>
                        <div class="skeleton-block" style="width: 80px; height: 32px; margin-bottom: 6px;"></div>
                        <div class="skeleton-block" style="width: 60px; height: 20px;"></div>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-end;">
                        <div class="skeleton-block" style="width: 90px; height: 20px; margin-bottom: 6px;"></div>
                        <div class="skeleton-block" style="width: 70px; height: 14px;"></div>
                    </div>
                </div>
                <div class="stamps-skeleton">
                    <div class="stamps-grid">
                        <div class="skeleton-circle"></div><div class="skeleton-circle"></div><div class="skeleton-circle"></div><div class="skeleton-circle"></div>
                        <div class="skeleton-circle"></div><div class="skeleton-circle"></div><div class="skeleton-circle"></div><div class="skeleton-circle"></div>
                    </div>
                    <div class="skeleton-block" style="width: 80%; height: 14px; margin: 0 auto;"></div>
                </div>
                <div class="skeleton-block" style="width: 100%; height: 60px; margin-bottom: 28px;"></div>
                <div class="skeleton-block" style="width: 140px; height: 140px; margin: 0 auto; border-radius: 18px;"></div>
            </div>
        </div>

        <!-- PANTALLA DE REGISTRO -->
        <div id="pantallaRegistro">
            <div class="registro-card">
                <div class="logo-container" style="margin-bottom: 40px;">
                    <div class="logo-animado">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 170" width="180" height="90">
                            <g transform="translate(15, 0)">
                                <text x="0" y="75" font-family="'Montserrat', sans-serif" font-weight="900" font-size="85" fill="var(--dark)" letter-spacing="-4px">club</text>
                                <text x="0" y="155" font-family="'Montserrat', sans-serif" font-weight="900" font-size="85" fill="var(--dark)" letter-spacing="-4px">rambla</text>
                                <rect x="305" y="130" width="24" height="24" fill="var(--accent)" />
                            </g>
                        </svg>
                    </div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Tu nombre</label>
                    <input type="text" id="inputNombre" class="input-box" placeholder="Ej: Simon" required>
                </div>
                
                <div class="input-group">
                    <label class="input-label">WhatsApp</label>
                    <input type="tel" id="inputCelular" class="input-box" placeholder="Ej: 2215551234" required>
                </div>
                
                <button class="btn-primary" id="btnCrearTarjeta">Crear/Entrar a mi Tarjeta</button>
                <button id="btnInstalarApp">Instalar app en tu celular</button>
            </div>
        </div>

        <!-- PANTALLA TARJETA -->
        <div id="pantallaTarjeta">
            <p class="texto-girar">Toca la tarjeta para girarla</p>
            
            <div class="flip-container" onclick="this.classList.toggle('flipped')">
                <div class="flipper">
                    <!-- FRENTE DE LA TARJETA -->
                    <div class="front">
                        <div class="wallet-card">
                            <div class="card-header">
                                <div style="display: flex; flex-direction: column;">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 170" width="110" height="55" style="margin-top: 2px;">
                                        <g transform="translate(0, 0)">
                                            <text x="0" y="75" font-family="'Montserrat', sans-serif" font-weight="900" font-size="85" fill="var(--dark)" letter-spacing="-4px">club</text>
                                            <text x="0" y="155" font-family="'Montserrat', sans-serif" font-weight="900" font-size="85" fill="var(--dark)" letter-spacing="-4px">rambla</text>
                                            <rect x="305" y="130" width="24" height="24" fill="var(--accent)" />
                                        </g>
                                    </svg>
                                </div>
                                <div class="user-info">
                                    <div class="user-nickname" id="displayNombre">...</div>
                                    <span class="user-tel-label" id="displayTelLabel">******0000</span>
                                </div>
                            </div>
                            
                            <div class="stamps-container">
                                <div class="stamps-grid" id="gridSellos"></div>
                                <p class="stamps-text">Sumá sellos y disfrutá tus beneficios</p>
                            </div>
                            
                            <div class="references-box">
                                <div class="ref-item">
                                    <div class="ref-icon-badge">
                                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="16" height="16">
                                            <path d="m20.725 17.825 -2.775 -1 2.075 -5.125 2.125 4.375c0.33335 0.66665 0.325 1.17915 -0.025 1.5375 -0.35 0.35835 -0.81665 0.42915 -1.4 0.2125Zm-6.15 -0.45 1.55 -9.575c0.0667 -0.38335 0.2125 -0.65 0.4375 -0.8 0.225 -0.15 0.5292 -0.15 0.9125 0l1.65 0.65c0.3167 0.13335 0.5375 0.32085 0.6625 0.5625 0.125 0.24165 0.1125 0.54585 -0.0375 0.9125l-3.375 8.25h-1.8Zm-6.7 0 -3.37499 -8.25c-0.13333 -0.33335 -0.14583 -0.62915 -0.0375 -0.8875 0.108335 -0.25835 0.32917 -0.45415 0.66249 -0.5875l1.65 -0.65c0.33335 -0.13335 0.62085 -0.14165 0.8625 -0.025 0.2417 0.11665 0.4042 0.39165 0.4875 0.825l1.55 9.575h-1.8Zm-4.34999 0.45c-0.58333 0.21665 -1.05 0.14585 -1.4 -0.2125 -0.35 -0.35835 -0.35833 -0.87085 -0.025 -1.5375l2.125 -4.375L6.3 16.825l-2.77499 1Zm7.39999 -0.45 -1.65 -10.7c-0.0833 -0.55 0.025 -0.96665 0.325 -1.25s0.725 -0.425 1.275 -0.425h2.5c0.55 0 0.975 0.14165 1.275 0.425 0.3 0.28335 0.40835 0.7 0.325 1.25l-1.65 10.7h-2.4Z" fill="var(--accent)"></path>
                                        </svg>
                                    </div>
                                    <span>Sello 3: 5% OFF en panificados</span>
                                    <span id="refStatus3" class="ref-text-status"></span>
                                </div>
                                <div class="ref-item">
                                    <div class="ref-icon-badge">
                                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="16" height="16">
                                            <path d="m11.4251 14.3501 -6.80002 -0.8c-0.31667 -0.03335 -0.525 -0.20415 -0.625 -0.5125 -0.1 -0.30835 -0.033335 -0.57085 0.2 -0.7875l11.00002 -10.1c0.06665 -0.05 0.1375 -0.09167 0.2125 -0.125 0.075 -0.033335 0.1875 -0.05 0.3375 -0.05 0.25 0 0.44165 0.104165 0.575 0.3125 0.1333 0.20833 0.1333 0.42083 0 0.6375l-3.75 6.725 6.8 0.8c0.31665 0.03335 0.525 0.20415 0.625 0.5125 0.1 0.30835 0.0333 0.57085 -0.2 0.7875l-11 10.1c-0.0667 0.05 -0.1375 0.09165 -0.2125 0.125 -0.075 0.03335 -0.1875 0.05 -0.3375 0.05 -0.25 0 -0.4417 -0.10415 -0.575 -0.3125 -0.13335 -0.20835 -0.13335 -0.42085 0 -0.6375l3.75 -6.725Zm-0.1 3 6.3 -5.575 -7.425 -0.9 2.475 -4.225 -6.325 5.6 7.425 0.875 -2.45 4.225Z" fill="var(--accent)"></path>
                                        </svg>
                                    </div>
                                    <span>Sello 5: Barrita de cereal GRATIS</span>
                                    <span id="refStatus5" class="ref-text-status"></span>
                                </div>
                                <div class="ref-item">
                                    <div class="ref-icon-badge">
                                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M38,30 V12 M50,32 V8 M62,30 V16" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>
                                            <path d="M20,35 H80 V75 Q80,90 65,90 H35 Q20,90 20,75 Z" fill="var(--accent)" stroke="var(--accent)" stroke-width="2"/>
                                            <path d="M22,37 H78 V73 Q78,88 63,88 H37 Q22,88 22,73 Z" fill="var(--bg-card)"/>
                                            <path d="M80,45 Q95,45 95,60 T80,75" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
                                        </svg>
                                    </div>
                                    <span>Sello 8: ¡Bebida completamente GRATIS!</span>
                                </div>
                            </div>
                            
                            <div class="info-row">
                                <div>
                                    <div class="info-label">Estado</div>
                                    <div class="info-value" id="displayPremio">...</div>
                                </div>
                                <div style="text-align: right;">
                                    <div class="info-label">Progreso</div>
                                    <div class="info-value info-value-points"><span id="displayPuntos">0</span>/8</div>
                                </div>
                            </div>
                            
                            <div class="qr-section">
                                <div class="qr-box"><img id="qrImage" src="" alt="QR Cliente"></div>
                                <div class="user-id">Tu codigo personal</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- DORSO DE LA TARJETA -->
                    <div class="back">
                        <div class="back-logo-animado">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 170" width="220" height="110">
                                <g transform="translate(15, 0)">
                                    <text x="0" y="75" font-family="'Montserrat', sans-serif" font-weight="900" font-size="85" fill="var(--dark)" letter-spacing="-4px">club</text>
                                    <text x="0" y="155" font-family="'Montserrat', sans-serif" font-weight="900" font-size="85" fill="var(--dark)" letter-spacing="-4px">rambla</text>
                                    <rect x="305" y="130" width="24" height="24" fill="var(--accent)" />
                                </g>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
            
            <button id="btnCerrarSesion" class="btn-cerrar">Cerrar sesion en este dispositivo</button>
        </div>
    </div>

    <!-- Contenedor del Confeti -->
    <div id="confettiContainer"></div>

    <script type="module" src="js/app-op1.js"></script>
    
</body>
</html>
